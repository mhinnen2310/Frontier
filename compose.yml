services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: frontier
      POSTGRES_USER: frontier
      POSTGRES_PASSWORD: frontier
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontier -d frontier"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - frontier-postgres:/var/lib/postgresql/data

volumes:
  frontier-postgres:
