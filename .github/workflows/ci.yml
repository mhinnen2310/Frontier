name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew clean spotlessCheck test releaseJar --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: TheFrontier
          path: frontier-bootstrap/build/libs/TheFrontier-*.jar
          if-no-files-found: error
