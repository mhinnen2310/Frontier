database:
  jdbc-url: jdbc:postgresql://localhost:5432/frontier
  username: frontier
  password: frontier
  maximum-pool-size: 10

campaigns:
  preparation-hours: 24
  maximum-duration-days: 14
  offline-structural-multiplier: 0.10
  breach-window-hours: 6
  breach-base-points: 1200
  breach-maximum-points: 3000
  declaration-cost-minor: 5000
  lifecycle-cycle-seconds: 5
  maximum-transitions-per-cycle: 32
  objective-cycle-seconds: 5

repairs:
  minimum-city-level: 3
  blocks-per-tick: 8
  unsafe-radius: 96
  post-combat-delay-seconds: 300
  restore-container-contents: false
  private-building-insurance: false
  cycle-seconds: 2
  task-lease-seconds: 30
