economy:
  perishables-enabled: false
  vault-bridge-enabled: false
  market-cycle-seconds: 5
  maximum-trades-per-cycle: 64
  production:
    cycle-seconds: 10
    maximum-orders-per-cycle: 64
  logistics:
    cycle-seconds: 10
    maximum-shipments-per-cycle: 64

compatibility:
  folia-certified: false
  restrict-vanilla-automation: false

performance:
  async-threads: 4
  maximum-visible-npcs-per-settlement: 20
  influence-cycle-seconds: 60

npcs:
  materialization-cycle-seconds: 5

world-simulation:
  cycle-seconds: 60
  maximum-cities-per-cycle: 32

civilization:
  cycle-seconds: 300
  maximum-kingdoms-per-cycle: 32

influence:
  cycle-seconds: 60
  maximum-settlements-per-cycle: 16
