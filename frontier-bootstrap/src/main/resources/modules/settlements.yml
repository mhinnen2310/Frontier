# Settlement simulation and synchronous claim-cache policy.
config-version: 1
enabled: true
simulation:
  check-seconds: 60
  maximum-per-cycle: 32
protection:
  cache-refresh-seconds: 2
founding:
  fee-minor: 2500
  minimum-founders: 1
  expedition-lifetime-hours: 24
  reservation-lifetime-minutes: 5
  minimum-core-distance: 128
  harbor-exclusion-radius: 256
  materials:
    stone-bricks: 64
    oak-logs: 16
    bells: 1
  allowed-environments:
    - NORMAL
membership:
  mayor-inactivity-days: 7
  settlement-inactivity-days: 30
  disband-confirmation-seconds: 30
  disband-request-minutes: 10
